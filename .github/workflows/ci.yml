on: [push, pull_request]

name: CI

jobs:
  check:
    name: test
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal

      - name: Run cargo test
        run: |
          cargo test
